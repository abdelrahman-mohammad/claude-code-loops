name: Bug Report
description: Report a bug in claude-code-loops
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the behavior.
      placeholder: |
        1. Run `npx claude-code-loops init --stack node`
        2. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true
  - type: dropdown
    id: stack
    attributes:
      label: Stack
      options:
        - node
        - spring-boot
        - fastapi
        - django
        - nextjs
        - generic
        - N/A
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Node.js version, Claude Code version.
      placeholder: |
        OS: macOS 14.3
        Node: 22.1.0
        Claude Code: 1.x
    validations:
      required: true
