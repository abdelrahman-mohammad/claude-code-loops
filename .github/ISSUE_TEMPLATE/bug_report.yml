name: Bug Report
description: Report a bug in claude-code-loops
labels: [bug]
body:
  - type: input
    id: version
    attributes:
      label: ccl version
      description: Run `ccl -V`
      placeholder: "0.6.2"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Windows
        - macOS
        - Linux
    validations:
      required: true
  - type: dropdown
    id: command
    attributes:
      label: Command
      options:
        - init
        - plan
        - run
        - config
        - Other
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ccl init --stack node
        2. ccl plan --prompt "..."
        3. See error
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Error output
      render: shell
